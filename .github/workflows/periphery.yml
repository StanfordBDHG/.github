name: Periphery

on:
  workflow_call:
    inputs:
      path:
        description: 'The path where the project is located. Defaults to $GITHUB_WORKSPACE'
        required: false
        type: string
        default: '.'
      runsonlabels:
        description: 'JSON-based collection of labels indicating which type of github runner should be chosen'
        required: false
        type: string
        default: '["macos-26"]'
      xcodeversion:
        description: 'The Xcode version used for the build'
        required: false
        type: string
        default: 'latest-stable'
      strict:
        description: 'Whether perhipery should run in --strict mode'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  periphery:
    name: Periphery
    runs-on: ${{ fromJson(inputs.runsonlabels) }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcodeversion }}
      - name: Install Metal toolchain
        if: ${{ runner.environment == 'github-hosted' && runner.os == 'macOS' }}
        run: |
          set -euo pipefail

          XCODE_BUILD_VERSION="$(xcodebuild -version | awk '/Build version/{print $3}')"
          SHOW_COMPONENT_OUTPUT="$(xcodebuild -showComponent MetalToolchain 2>&1 || true)"
          CURRENT_BUILD_VERSION="$(printf '%s\n' "$SHOW_COMPONENT_OUTPUT" | sed -E -n 's/^Build Version: (.*)$/\1/p' | head -n 1)"
          if [[ "$CURRENT_BUILD_VERSION" != "$XCODE_BUILD_VERSION" ]]; then
            xcodebuild -deleteComponent MetalToolchain || true
            xcodebuild -downloadComponent MetalToolchain -buildVersion "$XCODE_BUILD_VERSION"
          fi

          SHOW_COMPONENT_OUTPUT="$(xcodebuild -showComponent MetalToolchain 2>&1 || true)"
          echo "$SHOW_COMPONENT_OUTPUT"

          INSTALLED_BUILD_VERSION="$(printf '%s\n' "$SHOW_COMPONENT_OUTPUT" | sed -E -n 's/^Build Version: (.*)$/\1/p' | head -n 1)"
          if [[ "$INSTALLED_BUILD_VERSION" != "$XCODE_BUILD_VERSION" ]]; then
            echo "Expected Metal toolchain build $XCODE_BUILD_VERSION but found ${INSTALLED_BUILD_VERSION:-<none>}" >&2
            exit 1
          fi

          xcrun --kill-cache
          xcrun --no-cache --find metal
          xcrun --no-cache metal --version
      - name: Check environment
        run: |
            xcodebuild -version
            swift --version
            echo "env.selfhosted: ${{ env.selfhosted }}"
            echo "environment: ${{ inputs.environment }}"
      - name: Install periphery
        if: ${{ !env.selfhosted }}
        run: brew install periphery
      - name: Run periphery
        run: |
          periphery scan --relative-results --format github-actions ${{ inputs.strict && '--strict' || '' }} -- -skipPackagePluginValidation -skipMacroValidation
      - name: Cleanup periphery
        if: always()
        run: rm -rf ~/Library/Caches/com.github.peripheryapp
