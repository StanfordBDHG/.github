name: CI

on:
  workflow_call:
    inputs:
      linux_run_tests:
        type: boolean
        default: false
      linux_runners:
        type: string
        default: '["blacksmith-4vcpu-ubuntu-2404"]'
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  setup:
    name: Setup
    uses: StanfordBDHG/.github/.github/workflows/swift-package-setup.yml@feature/ci-workflow-inputs

  build_and_test:
    name: Build & Test
    needs: setup
    uses: StanfordBDHG/.github/.github/workflows/swift-package-test.yml@feature/ci-workflow-inputs
    with:
      package_name: ${{ needs.setup.outputs.package_name }}
      scheme: ${{ needs.setup.outputs.scheme }}
      platform_matrix: ${{ needs.setup.outputs.platform_matrix }}
      ui_platform_matrix: ${{ needs.setup.outputs.ui_platform_matrix }}
      linux_run_tests: ${{ inputs.linux_run_tests }}
      linux_runners: ${{ inputs.linux_runners }}
    secrets: inherit

  static_analysis:
    name: Static Analysis
    needs: setup
    uses: StanfordBDHG/.github/.github/workflows/swift-package-static-analysis.yml@feature/ci-workflow-inputs
    with:
      library_products: ${{ needs.setup.outputs.library_products }}
      platform_name: ${{ needs.setup.outputs.platform_name }}
      platform_version: ${{ needs.setup.outputs.platform_version }}
