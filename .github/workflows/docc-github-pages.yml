name: Documentation Deployment

on:
  workflow_call:
    inputs:
      path:
        description: |
          The path where the project is located. Defaults to $GITHUB_WORKSPACE
        required: false
        type: string
        default: '.'
      runsonlabels:
        description: |
          JSON-based collection of labels indicating which type of github runner should be chosen
        required: false
        type: string
        default: '["macos-26"]'
      xcodeversion:
        description: |
          The Xcode version used for the build
        required: false
        type: string
        default: 'latest-stable'
      scheme:
        description: |
          The scheme in the Xcode project.
          Either use `scheme` to use xcodebuild, `fastlanelane` to use fastlane, or a custom command using `customcommand`'
        required: true
        type: string
      destination:
        description: |
          The destination parameter that should be passed to xcodebuild.
          Defaults to the iOS simulator using an iPhone 17 Pro.
        required: false
        type: string
        default: 'platform=iOS Simulator,name=iPhone 17 Pro'
      dryrun:
        description: |
          Dry run deployment, only build documentation but do not publish
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploydocs:
    name: DocC to GitHub Pages Deployment
    runs-on: ${{ fromJson(inputs.runsonlabels) }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    environment:
      name: ${{ !inputs.dryrun && 'github-pages' || '' }}
      url: ${{ !inputs.dryrun && steps.deployment.outputs.page_url || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcodeversion }}
      - name: Install Metal toolchain
        if: ${{ runner.environment == 'github-hosted' && runner.os == 'macOS' }}
        run: |
          set -euo pipefail

          XCODE_BUILD_VERSION="$(xcodebuild -version | awk '/Build version/{print $3}')"
          XCODE_TOOLCHAIN_PATH="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain"
          METAL_EXPORT_PATH="${RUNNER_TEMP}/metal-toolchain-export"

          rm -rf "$METAL_EXPORT_PATH"
          xcodebuild -downloadComponent MetalToolchain -exportPath "$METAL_EXPORT_PATH"

          EXPORTED_BUNDLE="$(find "$METAL_EXPORT_PATH" -maxdepth 1 -type d -name 'MetalToolchain-*.exportedBundle' -print -quit)"
          if [[ -z "$EXPORTED_BUNDLE" ]]; then
            echo "Could not find exported Metal toolchain bundle in $METAL_EXPORT_PATH" >&2
            exit 1
          fi

          EXPORT_METADATA_PLIST="$EXPORTED_BUNDLE/ExportMetadata.plist"
          DOWNLOADED_BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :buildUpdateVersion' "$EXPORT_METADATA_PLIST" 2>/dev/null || true)"
          if [[ -n "$DOWNLOADED_BUILD_VERSION" && "$DOWNLOADED_BUILD_VERSION" != "$XCODE_BUILD_VERSION" ]]; then
            /usr/libexec/PlistBuddy -c "Set :buildUpdateVersion $XCODE_BUILD_VERSION" "$EXPORT_METADATA_PLIST"
          fi

          xcodebuild -deleteComponent MetalToolchain || true
          xcodebuild -importComponent MetalToolchain -importPath "$EXPORTED_BUNDLE"

          EXPORTED_TOOLCHAIN_USR_PATH="$(find "$EXPORTED_BUNDLE" -type d -path '*/Metal.xctoolchain/usr' -print -quit)"
          SHOW_COMPONENT_OUTPUT="$(xcodebuild -showComponent MetalToolchain 2>&1 || true)"
          echo "$SHOW_COMPONENT_OUTPUT"

          TOOLCHAIN_USR_PATH=""
          if [[ -n "$EXPORTED_TOOLCHAIN_USR_PATH" ]]; then
            TOOLCHAIN_USR_PATH="$EXPORTED_TOOLCHAIN_USR_PATH"
          fi

          TOOLCHAIN_SEARCH_PATH="$(printf '%s\n' "$SHOW_COMPONENT_OUTPUT" | sed -E -n 's/^Toolchain Search Path: (.*)$/\1/p' | head -n 1)"
          if [[ -n "$TOOLCHAIN_SEARCH_PATH" ]]; then
            TOOLCHAIN_USR_PATH="$TOOLCHAIN_SEARCH_PATH/Metal.xctoolchain/usr"
          elif [[ -z "$TOOLCHAIN_USR_PATH" ]]; then
            xcrun --kill-cache
            METAL_BIN="$(xcrun --no-cache --find metal 2>/dev/null || true)"
            if [[ -n "$METAL_BIN" ]]; then
              TOOLCHAIN_USR_PATH="$(cd "$(dirname "$METAL_BIN")/.." && pwd)"
            else
              echo "Could not determine the installed Metal toolchain path" >&2
              exit 1
            fi
          fi

          if [[ ! -d "$TOOLCHAIN_USR_PATH" ]]; then
            echo "Resolved Metal toolchain path does not exist: $TOOLCHAIN_USR_PATH" >&2
            exit 1
          fi

          if [[ "$TOOLCHAIN_USR_PATH" == "$XCODE_TOOLCHAIN_PATH/usr" ]]; then
            echo "Metal toolchain source already matches XcodeDefault.xctoolchain; skipping copy"
          else
            sudo ditto "$TOOLCHAIN_USR_PATH" "$XCODE_TOOLCHAIN_PATH/usr"
          fi

          xcrun --kill-cache
          xcrun --no-cache --find metal
          xcrun --no-cache metal --version
      - name: Check environment
        run: |
          xcodebuild -version
          swift --version
          echo "env.selfhosted: ${{ env.selfhosted }}"
          echo "environment: ${{ !inputs.dryrun && 'github-pages' || '' }}"
      - name: Install xcbeautify
        if: ${{ !env.selfhosted }}
        run: brew install xcbeautify
      - name: Build DocC
        run: |
          xcodebuild docbuild \
            -derivedDataPath .derivedData \
            -scheme "${{ inputs.scheme }}" \
            -destination "${{ inputs.destination }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
          | xcbeautify

          $(xcrun --find docc) process-archive \
            transform-for-static-hosting .derivedData/Build/Products/Debug-iphonesimulator/${{ inputs.scheme }}.doccarchive \
            --hosting-base-path ${GITHUB_REPOSITORY##*/} \
            --output-path .docs \
          | xcbeautify

          TARGET_NAME=$(echo ${{ inputs.scheme }} | tr '[:upper:]' '[:lower:]')
          echo "<script>window.location.href += \"/documentation/$TARGET_NAME \"</script>" > .docs/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.docs'
      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ !inputs.dryrun }}
        uses: actions/deploy-pages@v4
