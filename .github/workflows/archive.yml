name: Build XCArchive

on:
  workflow_call:
    inputs:
      workspaceFile:
        description: |
          The path of the Xcode Workspace file (including the file extension).
        type: string
        required: true
      xcArchiveName:
        description: |
          The name of the to be created XCArchive.
          It must not include the default XCArchive extension ".xcarchive" as the file naming is automatically done be the workflow.
        type: string
        required: true
      scheme:
        description: |
          The project scheme that should be used for the archiving process.
        type: string
        required: true
      version:
        description: |
          The version number of the XCFramework embedded in the XCArchives.
        type: string
        required: false
        default: 'ci'
      configuration:
        description: |
          The build configuration to use when archiving the scheme, either Debug or Release.
        type: string
        required: false
        default: 'Release'
      runsonlabels:
        description: |
          JSON-based collection of labels indicating which type of github runner should be chosen.
        type: string
        required: false
        default: '["macos-26"]'
      sdk:
        description: |
          JSON-based collection of SDK for the exported framework. Defaults to all SDKs.
          You can list SDKs using `xcodebuild -showsdks`.
        type: string
        required: false
        default: '["iphoneos", "iphonesimulator", "macosx", "appletvos", "appletvsimulator", "xros", "xrsimulator", "watchos", "watchsimulator"]'
      cxxInterop:
        description: |
          Enable the compilation of the XCArchive with active Swift / C++ interoperability.
        type: boolean
        required: false
        default: false

jobs:
  build-xcarchive:
    name: Build XCArchive
    runs-on: ${{ fromJson(inputs.runsonlabels) }}
    strategy:
      matrix:
        sdk: ${{ fromJson(inputs.sdk) }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install Metal toolchain
        if: ${{ runner.environment == 'github-hosted' && runner.os == 'macOS' }}
        run: |
          set -euo pipefail

          XCODE_BUILD_VERSION="$(xcodebuild -version | awk '/Build version/{print $3}')"
          XCODE_TOOLCHAIN_PATH="$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain"
          METAL_EXPORT_PATH="${RUNNER_TEMP}/metal-toolchain-export"

          rm -rf "$METAL_EXPORT_PATH"
          xcodebuild -downloadComponent MetalToolchain -exportPath "$METAL_EXPORT_PATH"

          EXPORTED_BUNDLE="$(find "$METAL_EXPORT_PATH" -maxdepth 1 -type d -name 'MetalToolchain-*.exportedBundle' -print -quit)"
          if [[ -z "$EXPORTED_BUNDLE" ]]; then
            echo "Could not find exported Metal toolchain bundle in $METAL_EXPORT_PATH" >&2
            exit 1
          fi

          EXPORT_METADATA_PLIST="$EXPORTED_BUNDLE/ExportMetadata.plist"
          DOWNLOADED_BUILD_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :buildUpdateVersion' "$EXPORT_METADATA_PLIST" 2>/dev/null || true)"
          if [[ -n "$DOWNLOADED_BUILD_VERSION" && "$DOWNLOADED_BUILD_VERSION" != "$XCODE_BUILD_VERSION" ]]; then
            /usr/libexec/PlistBuddy -c "Set :buildUpdateVersion $XCODE_BUILD_VERSION" "$EXPORT_METADATA_PLIST"
          fi

          xcodebuild -deleteComponent MetalToolchain || true
          xcodebuild -importComponent MetalToolchain -importPath "$EXPORTED_BUNDLE"

          SHOW_COMPONENT_OUTPUT="$(xcodebuild -showComponent MetalToolchain 2>&1 || true)"
          echo "$SHOW_COMPONENT_OUTPUT"

          TOOLCHAIN_SEARCH_PATH="$(printf '%s\n' "$SHOW_COMPONENT_OUTPUT" | sed -E -n 's/^Toolchain Search Path: (.*)$/\1/p' | head -n 1)"
          if [[ -n "$TOOLCHAIN_SEARCH_PATH" ]]; then
            TOOLCHAIN_USR_PATH="$TOOLCHAIN_SEARCH_PATH/Metal.xctoolchain/usr"
          else
            xcrun --kill-cache
            METAL_BIN="$(xcrun --no-cache --find metal 2>/dev/null || true)"
            if [[ -n "$METAL_BIN" ]]; then
              TOOLCHAIN_USR_PATH="$(cd "$(dirname "$METAL_BIN")/.." && pwd)"
            else
              echo "Could not determine the installed Metal toolchain path" >&2
              exit 1
            fi
          fi

          if [[ ! -d "$TOOLCHAIN_USR_PATH" ]]; then
            echo "Resolved Metal toolchain path does not exist: $TOOLCHAIN_USR_PATH" >&2
            exit 1
          fi

          sudo ditto "$TOOLCHAIN_USR_PATH" "$XCODE_TOOLCHAIN_PATH/usr"

          xcrun --kill-cache
          xcrun --no-cache --find metal
          xcrun --no-cache metal --version
      - name: Check environment
        run: |
            xcodebuild -version
            swift --version
            echo Release version: ${{ inputs.version }}
            echo SDK: ${{ matrix.sdk }}
      - name: Install xcbeautify
        if: ${{ !env.selfhosted && inputs.scheme != '' }}
        run: brew install xcbeautify
      - name: Archive for ${{ matrix.sdk }} SDK
        run: |
            xcodebuild archive \
              -workspace ${{ inputs.workspaceFile }} \
              -scheme ${{ inputs.scheme }} \
              -configuration ${{ inputs.configuration }} \
              -sdk ${{ matrix.sdk }} \
              -archivePath './.build/${{ inputs.xcArchiveName }}-${{ matrix.sdk }}.xcarchive' \
              SKIP_INSTALL=NO \
              BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
              ONLY_ACTIVE_ARCH=NO \
              CI=TRUE \
              VERSION_NUMBER=${{ inputs.version }} \
              SWIFT_OBJC_INTEROP_MODE=${{ (inputs.cxxInterop && 'objcxx') || 'objc' }} \
            | xcbeautify
      - name: Package the XCArchive   # To preserve symlinks within the XCArchives that are not preserved by the GitHub Actions artifact upload
        run: |
            cd .build
            tar -zcvf ${{ inputs.xcArchiveName }}-${{ matrix.sdk }}.xcarchive.tar.gz ${{ inputs.xcArchiveName }}-${{ matrix.sdk }}.xcarchive
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.xcArchiveName }}-${{ matrix.sdk }}.xcarchive.tar.gz
          path: ./.build/${{ inputs.xcArchiveName }}-${{ matrix.sdk }}.xcarchive.tar.gz
