name: Test

on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: true
      scheme:
        type: string
        required: true
      platform_matrix:
        type: string
        required: true
      ui_platform_matrix:
        type: string
        required: true
      linux_run_tests:
        type: boolean
        default: false
      linux_runners:
        type: string
        default: '["blacksmith-4vcpu-ubuntu-2404"]'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  package_tests:
    name: ${{ matrix.platform.name }} (${{ matrix.config }})
    uses: StanfordBDHG/.github/.github/workflows/xcodebuild-or-fastlane.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
        platform: ${{ fromJSON(inputs.platform_matrix) }}
      fail-fast: false
    with:
      job_name: ${{ format('{0} ({1})', matrix.platform.name, matrix.config) }}
      runsonlabels: '["macOS", "self-hosted"]'
      scheme: ${{ inputs.scheme }}
      destination: ${{ matrix.platform.destination }}
      buildConfig: ${{ matrix.config }}
      resultBundle: ${{ format('{0}-{1}-{2}.xcresult', inputs.package_name, matrix.platform.name, matrix.config) }}
      artifactname: ${{ format('{0}-{1}-{2}.xcresult', inputs.package_name, matrix.platform.name, matrix.config) }}

  ui_tests:
    name: UI ${{ matrix.platform.name }} (${{ matrix.config }})
    if: fromJSON(inputs.ui_platform_matrix)[0] != null
    uses: StanfordBDHG/.github/.github/workflows/xcodebuild-or-fastlane.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
        platform: ${{ fromJSON(inputs.ui_platform_matrix) }}
      fail-fast: false
    with:
      job_name: ${{ format('UI {0} ({1})', matrix.platform.name, matrix.config) }}
      runsonlabels: '["macOS", "self-hosted"]'
      path: 'Tests/UITests'
      scheme: ${{ matrix.platform.scheme }}
      destination: ${{ matrix.platform.destination }}
      buildConfig: ${{ matrix.config }}
      resultBundle: ${{ format('{0}-{1}-{2}.xcresult', matrix.platform.scheme, matrix.platform.name, matrix.config) }}
      artifactname: ${{ format('{0}-{1}-{2}.xcresult', matrix.platform.scheme, matrix.platform.name, matrix.config) }}

  package_tests_linux:
    name: Linux (${{ matrix.config }})
    if: inputs.linux_run_tests
    uses: StanfordBDHG/.github/.github/workflows/swift-test.yml@v2
    strategy:
      matrix:
        config: [Debug, Release]
      fail-fast: false
    with:
      job_name: ${{ format('Linux ({0})', matrix.config) }}
      runs_on_labels: ${{ inputs.linux_runners }}
      test_flags: '--no-parallel'
      build_configuration: ${{ matrix.config }}
      artifact_name: ${{ format('{0}-Package-Linux-{1}.lcov', inputs.package_name, matrix.config) }}

  uploadcoveragereport:
    name: Upload Coverage Report
    needs: [package_tests, ui_tests, package_tests_linux]
    if: always() && !cancelled() && !failure()
    uses: StanfordBDHG/.github/.github/workflows/create-and-upload-coverage-report.yml@v2
    with:
      coveragereports: >-
        ${{ format('{0}-*.xcresult', inputs.package_name) }}
        ${{ contains(inputs.ui_platform_matrix, '"scheme":"TestApp"') && 'TestApp-*.xcresult' || '' }}
        ${{ contains(inputs.ui_platform_matrix, '"scheme":"TestAppWatchApp"') && 'TestAppWatchApp-*.xcresult' || '' }}
      coveragereports_lcov: ${{ inputs.linux_run_tests && format('{0}-Package-Linux-*.lcov', inputs.package_name) || '' }}
    secrets:
      token: ${{ secrets.CODECOV_TOKEN }}
