name: Setup

on:
  workflow_call:
    outputs:
      package_name:
        value: ${{ jobs.parse.outputs.package_name }}
      scheme:
        value: ${{ jobs.parse.outputs.scheme }}
      platform_matrix:
        value: ${{ jobs.parse.outputs.platform_matrix }}
      ui_platform_matrix:
        value: ${{ jobs.parse.outputs.ui_platform_matrix }}
      ui_scheme:
        value: ${{ jobs.parse.outputs.ui_scheme }}
      watchos_ui_scheme:
        value: ${{ jobs.parse.outputs.watchos_ui_scheme }}
      watchos_ui_destination:
        value: ${{ jobs.parse.outputs.watchos_ui_destination }}
      library_products:
        value: ${{ jobs.parse.outputs.library_products }}
      platform_name:
        value: ${{ jobs.parse.outputs.platform_name }}
      platform_version:
        value: ${{ jobs.parse.outputs.platform_version }}

jobs:
  parse:
    name: Parse Package Manifest
    runs-on: macos-26
    outputs:
      package_name: ${{ steps.parse.outputs.package_name }}
      scheme: ${{ steps.parse.outputs.scheme }}
      platform_matrix: ${{ steps.parse.outputs.platform_matrix }}
      ui_platform_matrix: ${{ steps.parse.outputs.ui_platform_matrix }}
      ui_scheme: ${{ steps.parse.outputs.ui_scheme }}
      watchos_ui_scheme: ${{ steps.parse.outputs.watchos_ui_scheme }}
      watchos_ui_destination: ${{ steps.parse.outputs.watchos_ui_destination }}
      library_products: ${{ steps.parse.outputs.library_products }}
      platform_name: ${{ steps.parse.outputs.platform_name }}
      platform_version: ${{ steps.parse.outputs.platform_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse package manifest
        id: parse
        run: |
          DEVICE_IOS="iPhone 17 Pro"
          DEVICE_IPADOS="iPad Pro 11-inch (M5)"
          DEVICE_WATCHOS="Apple Watch Series 11 (46mm)"
          DEVICE_VISIONOS="Apple Vision Pro"
          DEVICE_TVOS="Apple TV 4K (3rd generation)"

          DUMP=$(swift package dump-package)

          PACKAGE_NAME=$(echo "$DUMP" | jq -r '.name')
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

          PLATFORM_MATRIX=$(echo "$DUMP" | jq -c \
              --arg ios "$DEVICE_IOS" \
              --arg watchos "$DEVICE_WATCHOS" \
              --arg visionos "$DEVICE_VISIONOS" \
              --arg tvos "$DEVICE_TVOS" \
              '[.platforms[].platformName |
                if . == "ios" then
                  {"name": "iOS", "destination": "platform=iOS Simulator,name=\($ios)"}
                elif . == "macos" then
                  {"name": "macOS", "destination": "platform=macOS,arch=arm64"}
                elif . == "maccatalyst" then
                  {"name": "Mac Catalyst", "destination": "platform=macOS,arch=arm64,variant=Mac Catalyst"}
                elif . == "watchos" then
                  {"name": "watchOS", "destination": "platform=watchOS Simulator,name=\($watchos)"}
                elif . == "visionos" then
                  {"name": "visionOS", "destination": "platform=visionOS Simulator,name=\($visionos)"}
                elif . == "tvos" then
                  {"name": "tvOS", "destination": "platform=tvOS Simulator,name=\($tvos)"}
                else
                  empty
                end
              ]')
          echo "platform_matrix=$PLATFORM_MATRIX" >> "$GITHUB_OUTPUT"

          if [ -d "Tests/UITests" ]; then
              echo "ui_scheme=TestApp" >> "$GITHUB_OUTPUT"

              PBXPROJ=$(find Tests/UITests -name "project.pbxproj" | head -1)
              if [ -z "$PBXPROJ" ]; then
                  echo "::error::Tests/UITests exists but no project.pbxproj found."
                  exit 1
              fi

              # Extract SUPPORTED_PLATFORMS and TARGETED_DEVICE_FAMILY from the TestAppUITests target
              UI_TEST_SETTINGS=$(python3 - "$PBXPROJ" << 'PYEOF'
          import re, sys

          with open(sys.argv[1]) as f:
              content = f.read()

          for block in re.findall(r'buildSettings\s*=\s*\{([^}]+)\}', content):
              if 'TEST_TARGET_NAME' not in block:
                  continue
              if re.search(r'SDKROOT\s*=\s*watchos', block):
                  continue
              sp = re.search(r'SUPPORTED_PLATFORMS\s*=\s*"([^"]+)"', block)
              td = re.search(r'TARGETED_DEVICE_FAMILY\s*=\s*"([^"]+)"', block)
              print(sp.group(1) if sp else "")
              print(td.group(1) if td else "")
              break
          PYEOF
              )

              SUPPORTED=$(echo "$UI_TEST_SETTINGS" | sed -n '1p')
              DEVICE_FAMILY=$(echo "$UI_TEST_SETTINGS" | sed -n '2p')

              if [ -z "$SUPPORTED" ]; then
                  echo "::error::SUPPORTED_PLATFORMS not found in the UITests target."
                  exit 1
              fi

              UI_PLATFORM_MATRIX=$(jq -n -c \
                  --arg supported "$SUPPORTED" \
                  --arg family "$DEVICE_FAMILY" \
                  --arg ios "$DEVICE_IOS" \
                  --arg ipados "$DEVICE_IPADOS" \
                  --arg visionos "$DEVICE_VISIONOS" \
                  --arg tvos "$DEVICE_TVOS" \
                  '($supported | split(" ") | unique) as $plats |
                  ($family | split(",") | map(gsub("\\s*"; ""))) as $fam |
                  (if ($plats | any(. == "iphonesimulator" or . == "iphoneos")) and ($fam | any(. == "1"))
                      then [{"name": "iOS", "destination": "platform=iOS Simulator,name=\($ios)"}] else [] end) +
                  (if ($plats | any(. == "iphonesimulator" or . == "iphoneos")) and ($fam | any(. == "2"))
                      then [{"name": "iPadOS", "destination": "platform=iOS Simulator,name=\($ipados)"}] else [] end) +
                  (if ($plats | any(. == "xrsimulator" or . == "xros"))
                      then [{"name": "visionOS", "destination": "platform=visionOS Simulator,name=\($visionos)"}] else [] end) +
                  (if ($plats | any(. == "appletvsimulator" or . == "appletvos"))
                      then [{"name": "tvOS", "destination": "platform=tvOS Simulator,name=\($tvos)"}] else [] end) +
                  (if ($plats | any(. == "macosx"))
                      then [{"name": "macOS", "destination": "platform=macOS,arch=arm64"}] else [] end)')
              echo "ui_platform_matrix=$UI_PLATFORM_MATRIX" >> "$GITHUB_OUTPUT"

              # watchOS UI tests (optional, detected by TestAppWatchApp scheme existence)
              if [ -f "Tests/UITests/UITests.xcodeproj/xcshareddata/xcschemes/TestAppWatchApp.xcscheme" ]; then
                  echo "watchos_ui_scheme=TestAppWatchApp" >> "$GITHUB_OUTPUT"
                  echo "watchos_ui_destination=platform=watchOS Simulator,name=$DEVICE_WATCHOS" >> "$GITHUB_OUTPUT"
              else
                  echo "watchos_ui_scheme=" >> "$GITHUB_OUTPUT"
                  echo "watchos_ui_destination=" >> "$GITHUB_OUTPUT"
              fi
          else
              echo "ui_scheme=" >> "$GITHUB_OUTPUT"
              echo 'ui_platform_matrix=[]' >> "$GITHUB_OUTPUT"
              echo "watchos_ui_scheme=" >> "$GITHUB_OUTPUT"
              echo "watchos_ui_destination=" >> "$GITHUB_OUTPUT"
          fi

          LIBRARY_PRODUCTS=$(echo "$DUMP" | jq -c '[.products[] | select(.type | tostring | test("library")) | .name]')
          echo "library_products=$LIBRARY_PRODUCTS" >> "$GITHUB_OUTPUT"

          LIBRARY_PRODUCT_COUNT=$(echo "$LIBRARY_PRODUCTS" | jq 'length')
          if [ "$LIBRARY_PRODUCT_COUNT" -gt 1 ]; then
              echo "scheme=${PACKAGE_NAME}-Package" >> "$GITHUB_OUTPUT"
          else
              echo "scheme=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          fi

          PLATFORMS_JSON=$(echo "$DUMP" | jq -c '.platforms')
          PLATFORMS_COUNT=$(echo "$PLATFORMS_JSON" | jq 'length')
          HAS_MACOS=$(echo "$PLATFORMS_JSON" | jq -r 'any(.[]; .platformName == "macos")')

          if [ "$PLATFORMS_COUNT" -eq 0 ] || [ "$HAS_MACOS" = "true" ]; then
              echo "platform_name=macos" >> "$GITHUB_OUTPUT"
              echo "platform_version=" >> "$GITHUB_OUTPUT"
          else
              PLATFORM_NAME=""
              PLATFORM_VERSION=""
              for p in ios maccatalyst visionos tvos watchos; do
                  EXISTS=$(echo "$PLATFORMS_JSON" | jq -r --arg p "$p" 'any(.[]; .platformName == $p)')
                  if [ "$EXISTS" = "true" ]; then
                      PLATFORM_NAME="$p"
                      PLATFORM_VERSION=$(echo "$PLATFORMS_JSON" | jq -r --arg p "$p" \
                          'map(select(.platformName == $p)) | first | .version // ""')
                      break
                  fi
              done
              echo "platform_name=$PLATFORM_NAME" >> "$GITHUB_OUTPUT"
              echo "platform_version=$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"
          fi
